# Local development stack — Postgres only.
# Next.js, PartyKit, and MinIO run on the host (use your existing MinIO on :9000).

services:
  postgres:
    image: postgres:16-alpine
    container_name: codex-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: codex
      POSTGRES_PASSWORD: codex
      POSTGRES_DB: codex
    ports:
      - '5433:5432'
    volumes:
      - codex_pg_data:/var/lib/postgresql/data
      - ./packages/db/drizzle/0000_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
      - ./packages/db/drizzle/0001_solo.sql:/docker-entrypoint-initdb.d/02-solo.sql:ro
      - ./packages/db/drizzle/0002_dice_layout.sql:/docker-entrypoint-initdb.d/03-dice-layout.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U codex -d codex']
      interval: 3s
      timeout: 5s
      retries: 10

volumes:
  codex_pg_data:
