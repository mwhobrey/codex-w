# Production sync relay — no npm on the host required.
#
#   cp .env.sync-server.example .env.sync-server   # first time
#   docker compose -f docker-compose.sync-server.yml --env-file .env.sync-server up -d --build
#
# CODEX_SYNC_DOCKER_NETWORK must match the network your Caddy container uses:
#   docker inspect caddy --format '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{"\n"}}{{end}}'

services:
  codex-sync:
    build:
      context: .
      dockerfile: apps/sync-server/Dockerfile
    container_name: codex-sync
    restart: unless-stopped
    environment:
      PORT: 1999
      HOST: 0.0.0.0
      NODE_ENV: production
    networks:
      - proxy
    # Optional: expose on host for debugging only
    # ports:
    #   - '1999:1999'

networks:
  proxy:
    external: true
    name: ${CODEX_SYNC_DOCKER_NETWORK:?Set CODEX_SYNC_DOCKER_NETWORK to your Caddy docker network}
