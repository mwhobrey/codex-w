name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Unit tests
        run: npm run test

      - name: Build web app
        run: npm run build --workspace=@codex/web
        env:
          NEXT_PUBLIC_PARTYKIT_HOST: 127.0.0.1:1999
          NEXT_PUBLIC_PARTYKIT_CONNECT: 'true'

  e2e:
    runs-on: ubuntu-latest
    needs: test-and-build
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: apps/web

      - name: Build web app
        run: npm run build --workspace=@codex/web
        env:
          NEXT_PUBLIC_PARTYKIT_HOST: 127.0.0.1:1999
          NEXT_PUBLIC_PARTYKIT_CONNECT: 'true'

      - name: Start PartyKit relay
        run: npm run dev --workspace=@codex/partykit &

      - name: Wait for PartyKit
        run: |
          for i in $(seq 1 45); do
            if nc -z 127.0.0.1 1999; then
              echo "PartyKit is up"
              exit 0
            fi
            sleep 1
          done
          echo "PartyKit failed to start"
          exit 1

      - name: E2E tests
        run: npm run test:e2e --workspace=@codex/web
        env:
          CI: true
